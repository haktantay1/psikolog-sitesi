<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa Bulunamadı · Haktan Tay</title>
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#F8F4EE; --text:#1C1916; --gold:#8A6428; --dim:#8A7E72;
          --serif:'Cormorant Garamond',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif; }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:var(--sans); font-weight:300;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:2rem;
  }
  .psi { font-family:var(--serif); font-size:5rem; color:var(--gold); margin-bottom:1rem; opacity:.7; }
  h1 { font-family:var(--serif); font-weight:400; font-size:clamp(2rem,4vw,3rem); line-height:1.2; margin-bottom:1rem; }
  h1 em { color:var(--gold); font-style:italic; }
  p  { color:var(--dim); max-width:34rem; margin:0 auto 2.5rem; line-height:1.7; }
  a  { display:inline-flex; align-items:center; gap:.6rem;
       color:var(--gold); text-decoration:none; font-size:.85rem;
       letter-spacing:.15em; text-transform:uppercase;
       border-bottom:1px solid var(--gold); padding-bottom:.3rem;
       transition: opacity .2s; }
  a:hover { opacity:.7; }
</style>
</head>
<body>
  <main>
    <div class="psi" aria-hidden="true">ψ</div>
    <h1>Aradığınız sayfa<br><em>burada değil.</em></h1>
    <p>Belki bir tıklama kaybolmuştur, belki söz yerini değiştirmiştir. Anasayfaya dönerek devam edebilirsiniz.</p>
    <a href="/">Anasayfaya Dön →</a>
  </main>
</body>
</html>
